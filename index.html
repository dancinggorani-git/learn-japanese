<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="일본어">
<meta name="theme-color" content="#007aff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>일본어 동사 활용</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, sans-serif; background: #f2f2f7; color: #1c1c1e; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }

.header { background: #fff; padding: 52px 16px 12px; border-bottom: 0.5px solid #c6c6c8; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 22px; font-weight: 700; }
.header p { font-size: 13px; color: #8e8e93; margin-top: 2px; }

.sticky-bar { position: sticky; top: 81px; z-index: 9; background: #f2f2f7; padding: 8px 16px 0; }
.search { width: 100%; padding: 10px 14px; font-size: 16px; border: none; border-radius: 10px; background: #fff; color: #1c1c1e; outline: none; }
.filter-wrap { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 8px 0 4px; }
.filter-wrap::-webkit-scrollbar { display: none; }
.filter-btn { padding: 6px 14px; font-size: 14px; border: none; border-radius: 20px; background: #fff; color: #8e8e93; cursor: pointer; white-space: nowrap; font-weight: 500; }
.filter-btn.active { background: #007aff; color: #fff; }

.count { font-size: 13px; color: #8e8e93; padding: 6px 16px 2px; }
.list { padding: 4px 16px 32px; }

.card { background: #fff; border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
.card-top { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.korean { font-size: 17px; font-weight: 600; }
.sub { font-size: 14px; color: #8e8e93; margin-top: 2px; }
.cat { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 5px; background: #e5e5ea; color: #636366; margin-left: 6px; }
.arrow { font-size: 11px; color: #c7c7cc; transition: transform 0.2s; flex-shrink: 0; margin-left: 8px; }
.card.open .arrow { transform: rotate(180deg); }

.detail { display: none; border-top: 0.5px solid #f2f2f7; }
.card.open .detail { display: block; }
.row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 16px; border-bottom: 0.5px solid #f2f2f7; }
.row:last-child { border-bottom: none; }
.badge { font-size: 11px; font-weight: 600; padding: 3px 0; border-radius: 6px; white-space: nowrap; flex-shrink: 0; width: 58px; text-align: center; margin-top: 2px; }
.badge.p  { background: #d1f2e8; color: #1a7a4a; }
.badge.pa { background: #fef3cd; color: #856404; }
.badge.n  { background: #fde2e2; color: #b91c1c; }
.badge.pn { background: #e5e5ea; color: #636366; }
.val .jp  { font-size: 16px; color: #1c1c1e; }
.val .rom { font-size: 13px; color: #8e8e93; margin-top: 2px; }

.install-banner { display: none; position: fixed; bottom: 20px; left: 16px; right: 16px; background: #1c1c1e; color: #fff; border-radius: 14px; padding: 14px 16px; z-index: 100; font-size: 14px; }
.install-banner.show { display: flex; align-items: center; gap: 10px; }
.install-banner button { margin-left: auto; background: #007aff; color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; flex-shrink: 0; }

@media (prefers-color-scheme: dark) {
  body { background: #1c1c1e; color: #f2f2f7; }
  .header { background: #2c2c2e; border-color: #3a3a3c; }
  .sticky-bar { background: #1c1c1e; }
  .search { background: #2c2c2e; color: #f2f2f7; }
  .filter-btn { background: #2c2c2e; color: #8e8e93; }
  .filter-btn.active { background: #0a84ff; }
  .card { background: #2c2c2e; }
  .detail { border-top-color: #3a3a3c; }
  .row { border-bottom-color: #3a3a3c; }
  .val .jp { color: #f2f2f7; }
  .badge.p  { background: #0d3d2a; color: #34c759; }
  .badge.pa { background: #3d2e00; color: #ffd60a; }
  .badge.n  { background: #3d0d0d; color: #ff453a; }
  .badge.pn { background: #3a3a3c; color: #aeaeb2; }
  .cat { background: #3a3a3c; color: #aeaeb2; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🇯🇵 일본어 동사 활용</h1>
  <p>탭해서 활용형 확인 · 오프라인 사용 가능</p>
</div>

<div class="sticky-bar">
  <input class="search" type="search" placeholder="검색... (먹다, 타베루, 食べる)" id="search" oninput="render()">
  <div class="filter-wrap">
    <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn" onclick="setFilter('이동',this)">이동</button>
    <button class="filter-btn" onclick="setFilter('행동',this)">행동</button>
    <button class="filter-btn" onclick="setFilter('일상',this)">일상</button>
    <button class="filter-btn" onclick="setFilter('감정',this)">감정</button>
  </div>
</div>

<div class="count" id="count"></div>
<div class="list" id="list"></div>

<div class="install-banner" id="banner">
  <span>📲 홈화면에 추가하면 앱처럼 써요!</span>
  <button onclick="document.getElementById('banner').style.display='none'">닫기</button>
</div>

<script>
const verbs = [
  {k:"가다",j:"行く",r:"이쿠",cat:"이동",p:"行きます",pr:"이키마스",pa:"行きました",par:"이키마시타",n:"行きません",nr:"이키마센",pn:"行きませんでした",pnr:"이키마센데시타"},
  {k:"오다",j:"来る",r:"쿠루",cat:"이동",p:"来ます",pr:"키마스",pa:"来ました",par:"키마시타",n:"来ません",nr:"키마센",pn:"来ませんでした",pnr:"키마센데시타"},
  {k:"돌아가다",j:"帰る",r:"카에루",cat:"이동",p:"帰ります",pr:"카에리마스",pa:"帰りました",par:"카에리마시타",n:"帰りません",nr:"카에리마센",pn:"帰りませんでした",pnr:"카에리마센데시타"},
  {k:"걷다",j:"歩く",r:"아루쿠",cat:"이동",p:"歩きます",pr:"아루키마스",pa:"歩きました",par:"아루키마시타",n:"歩きません",nr:"아루키마센",pn:"歩きませんでした",pnr:"아루키마센데시타"},
  {k:"달리다",j:"走る",r:"하시루",cat:"이동",p:"走ります",pr:"하시리마스",pa:"走りました",par:"하시리마시타",n:"走りません",nr:"하시리마센",pn:"走りませんでした",pnr:"하시리마센데시타"},
  {k:"먹다",j:"食べる",r:"타베루",cat:"행동",p:"食べます",pr:"타베마스",pa:"食べました",par:"타베마시타",n:"食べません",nr:"타베마센",pn:"食べませんでした",pnr:"타베마센데시타"},
  {k:"마시다",j:"飲む",r:"노무",cat:"행동",p:"飲みます",pr:"노미마스",pa:"飲みました",par:"노미마시타",n:"飲みません",nr:"노미마센",pn:"飲みませんでした",pnr:"노미마센데시타"},
  {k:"보다",j:"見る",r:"미루",cat:"행동",p:"見ます",pr:"미마스",pa:"見ました",par:"미마시타",n:"見ません",nr:"미마센",pn:"見ませんでした",pnr:"미마센데시타"},
  {k:"읽다",j:"読む",r:"요무",cat:"행동",p:"読みます",pr:"요미마스",pa:"読みました",par:"요미마시타",n:"読みません",nr:"요미마센",pn:"読みませんでした",pnr:"요미마센데시타"},
  {k:"쓰다",j:"書く",r:"카쿠",cat:"행동",p:"書きます",pr:"카키마스",pa:"書きました",par:"카키마시타",n:"書きません",nr:"카키마센",pn:"書きませんでした",pnr:"카키마센데시타"},
  {k:"말하다",j:"話す",r:"하나스",cat:"행동",p:"話します",pr:"하나시마스",pa:"話しました",par:"하나시마시타",n:"話しません",nr:"하나시마센",pn:"話しませんでした",pnr:"하나시마센데시타"},
  {k:"듣다",j:"聴く",r:"키쿠",cat:"행동",p:"聴きます",pr:"키키마스",pa:"聴きました",par:"키키마시타",n:"聴きません",nr:"키키마센",pn:"聴きませんでした",pnr:"키키마센데시타"},
  {k:"묻다",j:"聞く",r:"키쿠",cat:"행동",p:"聞きます",pr:"키키마스",pa:"聞きました",par:"키키마시타",n:"聞きません",nr:"키키마센",pn:"聞きませんでした",pnr:"키키마센데시타"},
  {k:"만들다",j:"作る",r:"츠쿠루",cat:"행동",p:"作ります",pr:"츠쿠리마스",pa:"作りました",par:"츠쿠리마시타",n:"作りません",nr:"츠쿠리마센",pn:"作りませんでした",pnr:"츠쿠리마센데시타"},
  {k:"사다",j:"買う",r:"카우",cat:"행동",p:"買います",pr:"카이마스",pa:"買いました",par:"카이마시타",n:"買いません",nr:"카이마센",pn:"買いませんでした",pnr:"카이마센데시타"},
  {k:"팔다",j:"売る",r:"우루",cat:"행동",p:"売ります",pr:"우리마스",pa:"売りました",par:"우리마시타",n:"売りません",nr:"우리마센",pn:"売りませんでした",pnr:"우리마센데시타"},
  {k:"사용하다",j:"使う",r:"츠카우",cat:"행동",p:"使います",pr:"츠카이마스",pa:"使いました",par:"츠카이마시타",n:"使いません",nr:"츠카이마센",pn:"使いませんでした",pnr:"츠카이마센데시타"},
  {k:"하다",j:"する",r:"스루",cat:"행동",p:"します",pr:"시마스",pa:"しました",par:"시마시타",n:"しません",nr:"시마센",pn:"しませんでした",pnr:"시마센데시타"},
  {k:"잠에서 일어나다",j:"起きる",r:"오키루",cat:"일상",p:"起きます",pr:"오키마스",pa:"起きました",par:"오키마시타",n:"起きません",nr:"오키마센",pn:"起きませんでした",pnr:"오키마센데시타"},
  {k:"자다",j:"寝る",r:"네루",cat:"일상",p:"寝ます",pr:"네마스",pa:"寝ました",par:"네마시타",n:"寝ません",nr:"네마센",pn:"寝ませんでした",pnr:"네마센데시타"},
  {k:"앉다",j:"座る",r:"스와루",cat:"일상",p:"座ります",pr:"스와리마스",pa:"座りました",par:"스와리마시타",n:"座りません",nr:"스와리마센",pn:"座りませんでした",pnr:"스와리마센데시타"},
  {k:"서다",j:"立つ",r:"타츠",cat:"일상",p:"立ちます",pr:"타치마스",pa:"立ちました",par:"타치마시타",n:"立ちません",nr:"타치마센",pn:"立ちませんでした",pnr:"타치마센데시타"},
  {k:"일하다",j:"働く",r:"하타라쿠",cat:"일상",p:"働きます",pr:"하타라키마스",pa:"働きました",par:"하타라키마시타",n:"働きません",nr:"하타라키마센",pn:"働きませんでした",pnr:"하타라키마센데시타"},
  {k:"만나다",j:"会う",r:"아우",cat:"일상",p:"会います",pr:"아이마스",pa:"会いました",par:"아이마시타",n:"会いません",nr:"아이마센",pn:"会いませんでした",pnr:"아이마센데시타"},
  {k:"기다리다",j:"待つ",r:"마츠",cat:"일상",p:"待ちます",pr:"마치마스",pa:"待ちました",par:"마치마시타",n:"待ちません",nr:"마치마센",pn:"待ちませんでした",pnr:"마치마센데시타"},
  {k:"좋아하다",j:"好きだ",r:"스키다",cat:"감정",p:"好きです",pr:"스키데스",pa:"好きでした",par:"스키데시타",n:"好きじゃないです",nr:"스키쟈나이데스",pn:"好きじゃなかったです",pnr:"스키쟈나캇타데스"},
  {k:"싫어하다",j:"嫌いだ",r:"키라이다",cat:"감정",p:"嫌いです",pr:"키라이데스",pa:"嫌いでした",par:"키라이데시타",n:"嫌いじゃないです",nr:"키라이쟈나이데스",pn:"嫌いじゃなかったです",pnr:"키라이쟈나캇타데스"},
  {k:"이해하다",j:"わかる",r:"와카루",cat:"감정",p:"わかります",pr:"와카리마스",pa:"わかりました",par:"와카리마시타",n:"わかりません",nr:"와카리마센",pn:"わかりませんでした",pnr:"와카리마센데시타"},
  {k:"생각하다",j:"思う",r:"오모우",cat:"감정",p:"思います",pr:"오모이마스",pa:"思いました",par:"오모이마시타",n:"思いません",nr:"오모이마센",pn:"思いませんでした",pnr:"오모이마센데시타"},
];

let currentFilter = 'all';
let openIdx = null;

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  openIdx = null;
  render();
}

function toggle(idx) {
  openIdx = openIdx === idx ? null : idx;
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = verbs.filter(v => {
    const matchCat = currentFilter === 'all' || v.cat === currentFilter;
    const matchQ = !q || v.k.includes(q) || v.r.includes(q) || v.j.includes(q);
    return matchCat && matchQ;
  });
  document.getElementById('count').textContent = filtered.length + '개 동사';
  document.getElementById('list').innerHTML = filtered.map(v => {
    const idx = verbs.indexOf(v);
    const isOpen = openIdx === idx;
    return `<div class="card${isOpen?' open':''}">
      <div class="card-top" onclick="toggle(${idx})">
        <div>
          <div class="korean">${v.k}<span class="cat">${v.cat}</span></div>
          <div class="sub">${v.j} · ${v.r}</div>
        </div>
        <span class="arrow">▼</span>
      </div>
      <div class="detail">
        <div class="row"><span class="badge p">현재</span><div class="val"><div class="jp">${v.p}</div><div class="rom">${v.pr}</div></div></div>
        <div class="row"><span class="badge pa">과거</span><div class="val"><div class="jp">${v.pa}</div><div class="rom">${v.par}</div></div></div>
        <div class="row"><span class="badge n">현재부정</span><div class="val"><div class="jp">${v.n}</div><div class="rom">${v.nr}</div></div></div>
        <div class="row"><span class="badge pn">과거부정</span><div class="val"><div class="jp">${v.pn}</div><div class="rom">${v.pnr}</div></div></div>
      </div>
    </div>`;
  }).join('');
}

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
if (isIOS && !isStandalone) {
  setTimeout(() => document.getElementById('banner').classList.add('show'), 2000);
}
</script>
</body>
</html>
