<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="일본어">

<title>일본어 동사 활용</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, sans-serif; background: #f2f2f7; color: #1c1c1e; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
.header { background: #fff; padding: 52px 16px 12px; border-bottom: 0.5px solid #c6c6c8; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 22px; font-weight: 700; }
.header p { font-size: 13px; color: #8e8e93; margin-top: 2px; }
.sticky-bar { position: sticky; top: 81px; z-index: 9; background: #f2f2f7; padding: 8px 16px 0; }
.search { width: 100%; padding: 10px 14px; font-size: 16px; border: none; border-radius: 10px; background: #fff; color: #1c1c1e; outline: none; }
.filter-wrap { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 8px 0 4px; }
.filter-wrap::-webkit-scrollbar { display: none; }
.filter-btn { padding: 6px 14px; font-size: 14px; border: none; border-radius: 20px; background: #fff; color: #8e8e93; cursor: pointer; white-space: nowrap; font-weight: 500; }
.filter-btn.active { background: #007aff; color: #fff; }
.count { font-size: 13px; color: #8e8e93; padding: 6px 16px 2px; }
.list { padding: 4px 16px 32px; }
.card { background: #fff; border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
.card-top { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.korean { font-size: 17px; font-weight: 600; }
.sub { font-size: 14px; color: #8e8e93; margin-top: 2px; }
.cat { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 5px; background: #e5e5ea; color: #636366; margin-left: 6px; }
.arrow { font-size: 11px; color: #c7c7cc; transition: transform 0.2s; flex-shrink: 0; margin-left: 8px; }
.card.open .arrow { transform: rotate(180deg); }
.detail { display: none; border-top: 0.5px solid #f2f2f7; }
.card.open .detail { display: block; }
.row { padding: 12px 16px; border-bottom: 0.5px solid #f2f2f7; }
.row:last-child { border-bottom: none; }
.row-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.badge { font-size: 11px; font-weight: 600; padding: 3px 0; border-radius: 6px; white-space: nowrap; flex-shrink: 0; width: 58px; text-align: center; margin-top: 2px; }
.badge.p  { background: #d1f2e8; color: #1a7a4a; }
.badge.pa { background: #fef3cd; color: #856404; }
.badge.n  { background: #fde2e2; color: #b91c1c; }
.badge.pn { background: #e5e5ea; color: #636366; }
.val .jp  { font-size: 16px; color: #1c1c1e; }
.val .rom { font-size: 13px; color: #8e8e93; margin-top: 2px; }
.example { background: #f8f8f8; border-radius: 8px; padding: 10px 12px; margin-top: 6px; }
.ex-jp { font-size: 14px; color: #1c1c1e; line-height: 1.5; }
.ex-rom { font-size: 12px; color: #8e8e93; margin-top: 3px; line-height: 1.5; }
.ex-ko { font-size: 13px; color: #3a3a3c; margin-top: 3px; line-height: 1.5; font-weight: 500; }

@media (prefers-color-scheme: dark) {
  body { background: #1c1c1e; color: #f2f2f7; }
  .header { background: #2c2c2e; border-color: #3a3a3c; }
  .sticky-bar { background: #1c1c1e; }
  .search { background: #2c2c2e; color: #f2f2f7; }
  .filter-btn { background: #2c2c2e; color: #8e8e93; }
  .filter-btn.active { background: #0a84ff; }
  .card { background: #2c2c2e; }
  .detail { border-top-color: #3a3a3c; }
  .row { border-bottom-color: #3a3a3c; }
  .val .jp { color: #f2f2f7; }
  .badge.p  { background: #0d3d2a; color: #34c759; }
  .badge.pa { background: #3d2e00; color: #ffd60a; }
  .badge.n  { background: #3d0d0d; color: #ff453a; }
  .badge.pn { background: #3a3a3c; color: #aeaeb2; }
  .cat { background: #3a3a3c; color: #aeaeb2; }
  .example { background: #3a3a3c; }
  .ex-jp { color: #f2f2f7; }
  .ex-ko { color: #d1d1d6; }
}
</style>

</div>

    {t:"과거부정",b:"pn",jp:"思いませんでした",rom:"오모이마센데시타",exJp:"そこまでは思いませんでした。",exRom:"소코마데와 오모이마센데시타。",exKo:"그 정도까지는 생각하지 않았습니다。"},
   ]},
];

let currentFilter = 'all';
let openIdx = null;

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  openIdx = null;
  render();
}

function toggle(idx) {
  openIdx = openIdx === idx ? null : idx;
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = verbs.filter(v => {
    const matchCat = currentFilter === 'all' || v.cat === currentFilter;
    const matchQ = !q || v.k.includes(q) || v.r.includes(q) || v.j.includes(q);
    return matchCat && matchQ;
  });
  document.getElementById('count').textContent = filtered.length + '개 동사';
  document.getElementById('list').innerHTML = filtered.map(v => {
    const idx = verbs.indexOf(v);
    const isOpen = openIdx === idx;
    return `<div class="card${isOpen?' open':''}">
      <div class="card-top" onclick="toggle(${idx})">
        <div>
          <div class="korean">${v.k}<span class="cat">${v.cat}</span></div>
          <div class="sub">${v.j} · ${v.r}</div>
        </div>
        <span class="arrow">▼</span>
      </div>
      <div class="detail">
        ${v.forms.map(f => `
        <div class="row">
          <div class="row-top">
            <span class="badge ${f.b}">${f.t}</span>
            <div class="val"><div class="jp">${f.jp}</div><div class="rom">${f.rom}</div></div>
          </div>
          <div class="example">
            <div class="ex-jp">${f.exJp}</div>
            <div class="ex-rom">${f.exRom}</div>
            <div class="ex-ko">${f.exKo}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
